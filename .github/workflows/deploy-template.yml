name: Deployment Template

on:
  workflow_call:
    inputs:
      publish_dir:
        description: 'Directorio con los archivos estáticos a desplegar'
        required: true
        type: string
      environment_name:
        description: 'Nombre del entorno de GitHub'
        required: false
        type: string
        default: 'github-pages'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  upload-and-deploy:
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.publish_dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5